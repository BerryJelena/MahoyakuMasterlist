<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Translation Masterlist</title>
    <meta name="description" content="A fan-made Mahoyaku masterlist that lists English translations of event and campaigns.">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Load Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Load Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/phosphor-icons"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        'brand-primary': '#9F2B68',
                        'brand-light': '#c24e8a',
                        'brand-dark': '#7a1f4f',
                        'dark-bg': '#2d0a1d',
                        'dark-card': '#3d1229',
                    }
                }
            }
        }
    </script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        
        .item { 
            width: 100%; 
            margin-bottom: 1em; 
        }

        @media (min-width: 768px) { 
            .item { width: calc(50% - 0.5em); } 
        }

        @media (min-width: 1280px) { 
            .item { width: calc(33.333% - 0.67em); } 
        }

        .chara-icon { width: 40px; height: 40px; transition: all 0.2s; border-radius: 8px; filter: grayscale(100%); opacity: 0.5; }
        .chara-icon.selected { filter: grayscale(0%); opacity: 1; transform: scale(1.1); outline: 3px solid #9F2B68; }
        
        .status-icon svg { width: 22px; height: 22px; fill: currentColor; }
        .active-filter { background-color: #9F2B68 !important; color: white !important; }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #9F2B68; border-radius: 10px; }
        
        #grid { width: 100%; }

        .banner-container {
            width: 100%;
            height: auto;
            background-color: #fce7f3;
            overflow: hidden;
            display: block;
        }
        .dark .banner-container { background-color: #1e0614; }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.7s ease;
        }
    </style>
</head>
<body class="bg-rose-50/30 text-slate-900 dark:bg-dark-bg dark:text-rose-50 min-h-screen">

    <!-- Mobile Header -->
    <div class="lg:hidden sticky top-0 z-50 bg-white/90 dark:bg-dark-bg/90 backdrop-blur-md border-b border-rose-100 dark:border-brand-dark p-4 flex justify-between items-center">
        <h1 class="font-black text-brand-primary dark:text-brand-light tracking-tighter uppercase italic">Masterlist</h1>
        <button id="mobile-menu-toggle" class="p-2 bg-rose-100 dark:bg-brand-dark rounded-lg">
            <i class="ph-list-bold text-2xl"></i>
        </button>
    </div>

    <div class="flex flex-col lg:flex-row">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-dark-card border-r border-rose-100 dark:border-brand-dark transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto p-6 sidebar">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black text-brand-primary dark:text-brand-light tracking-tighter uppercase italic">Masterlist</h2>
                <button id="close-sidebar" class="lg:hidden text-2xl text-brand-primary"><i class="ph-x-bold"></i></button>
            </div>

            <div class="mb-8">
                <div class="relative">
                    <i class="ph-magnifying-glass absolute left-3 top-3 text-brand-primary/50"></i>
                    <input type="text" id="quicksearch" placeholder="Search events..." class="w-full pl-10 pr-4 py-2 bg-rose-50 dark:bg-brand-dark/30 border-none rounded-xl focus:ring-2 focus:ring-brand-primary outline-none text-sm">
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-brand-primary/60 dark:text-brand-light/60 mb-4">Translation Status</h3>
                <div class="flex flex-col gap-2 filter-group" data-filter-group="tlStatus">
                    <button data-filter-value="" class="active-filter text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl">All Events</button>
                    <button data-filter-value=".is-tl" class="text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl flex items-center gap-2">
                        <i class="ph-check-circle-fill text-brand-primary"></i> Translated
                    </button>
                    <button data-filter-value=".no-tl" class="text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl flex items-center gap-2">
                        <i class="ph-circle text-slate-300"></i> Untranslated
                    </button>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-brand-primary/60 dark:text-brand-light/60 mb-4">Content Year</h3>
                <div id="year-filters" class="flex flex-wrap gap-2 filter-group" data-filter-group="year">
                    <button data-filter-value="" class="active-filter px-3 py-1 text-xs font-bold bg-rose-100 dark:bg-brand-dark/50 rounded-full">All</button>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-brand-primary/60 dark:text-brand-light/60 mb-4">Countries</h3>
                <div class="flex flex-wrap gap-2 filter-group" data-filter-group="country">
                    <button data-filter-value="" class="active-filter px-3 py-1 text-xs font-bold bg-rose-100 dark:bg-brand-dark/50 rounded-full">All</button>
                    <button data-filter-value=".central" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">Central</button>
                    <button data-filter-value=".north" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">North</button>
                    <button data-filter-value=".east" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">East</button>
                    <button data-filter-value=".west" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">West</button>
                    <button data-filter-value=".south" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">South</button>
                </div>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-brand-primary/60 dark:text-brand-light/60 mb-4">Characters</h3>
                <div id="character-filters" class="grid grid-cols-4 gap-3 filter-group" data-filter-group="character">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="mt-auto pt-6 border-t border-rose-100 dark:border-brand-dark">
                <button id="dark-mode-toggle" class="flex items-center justify-center gap-3 w-full p-3 rounded-xl bg-brand-primary text-white hover:bg-brand-dark transition-all font-bold text-xs uppercase tracking-widest">
                    <i id="mode-icon" class="ph-sun-bold text-xl hidden dark:block"></i>
                    <i id="mode-icon-light" class="ph-moon-stars-bold text-xl block dark:hidden"></i>
                    <span>Night Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:ml-72 p-4 lg:p-10">
            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-brand-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-bold text-brand-primary/50 uppercase tracking-widest text-[10px]">Syncing Archive...</p>
            </div>

            <div id="grid" class="opacity-0 transition-opacity duration-500">
                <!-- Items injected here -->
            </div>
        </main>
    </div>

    <script>
        const sheetId = "1SHxrt80OQj4RfjnhmkFiGI_pLr03F-f6DUlBoOlsONU";
        const sheetName = encodeURIComponent("Output_(Events)");
        const sheetURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        const CHECKMARK_SVG = `<svg viewBox="0 0 24 24" class="text-brand-primary"><path d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M19,19H5V5H19V19M17.96,8.46L16.54,7.04L10.5,13.09L7.46,10.04L6.04,11.46L10.5,15.91L17.96,8.46Z" /></svg>`;
        const BLANK_BOX_SVG = `<svg viewBox="0 0 24 24" class="text-slate-200 dark:text-white/10"><path d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M19,19H5V5H19V19Z" /></svg>`;

        const characterData = [
            { name: "oz", id: 1 }, { name: "arthur", id: 2 }, { name: "cain", id: 3 },
            { name: "riquet", id: 4 }, { name: "snow", id: 5 }, { name: "white", id: 6 },
            { name: "mithra", id: 7 }, { name: "owen", id: 8 }, { name: "bradley", id: 9 },
            { name: "faust", id: 10 }, { name: "shino", id: 11 }, { name: "heathcliff", id: 12 },
            { name: "nero", id: 13 }, { name: "shylock", id: 14 }, { name: "murr", id: 15 },
            { name: "chloe", id: 16 }, { name: "rustica", id: 17 }, { name: "figaro", id: 18 },
            { name: "rutile", id: 19 }, { name: "lennox", id: 20 }, { name: "mitile", id: 21 },
            { name: "akira", id: 22 }, { name: "cockrobin", id: 23 },
        ];

        let $grid;
        let filters = {};
        let allItems = [];

        function csvSplit(row) {
            const matches = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(val => val.trim().replace(/^"|"$/g, '')) : [];
        }

        function csvToObjects(csv) {
            const csvRows = csv.split("\n").filter(row => row.trim() !== '');
            if (csvRows.length === 0) return [];
            const propertyNames = csvSplit(csvRows[0]).map(p => p.trim()); 
            let objects = [];
            for (let i = 1, max = csvRows.length; i < max; i++) {
                let thisObject = { id: i };
                let row = csvSplit(csvRows[i]);
                for (let j = 0; j < row.length; j++) {
                    thisObject[propertyNames[j]] = row[j];
                }
                objects.push(thisObject);
            }
            return objects;
        }

        function getLinkTitle(url) {
            try {
                const urlObj = new URL(url);
                let hostname = urlObj.hostname.toLowerCase();
                let parts = hostname.replace('www.', '').split('.');
                
                if (parts.length >= 2) {
                    const user = parts[0];
                    const host = parts[1];
                    if (['dreamwidth', 'wordpress', 'tumblr', 'fandom'].includes(host)) {
                        return `TL: ${user} ${host}`;
                    }
                    return `TL: ${user} ${host}`;
                }
                return `TL: ${hostname}`;
            } catch (e) {
                return "Read Translation";
            }
        }

        function createItemElement(item) {
            const itemId = Number(item.id);
            const eventName = (item.Event_Name || item.Title || "Untitled").replaceAll("_", " ").replaceAll("$", ", ").trim();
            const charactersFormatted = (item.Character || "").replaceAll("-", ", ").trim();
            const writer = item.Writer || "Unknown";
            const isTranslated = String(item.TL).toUpperCase() === "TRUE";
            const tlClass = isTranslated ? 'is-tl' : 'no-tl';
            const country = (item.Country || "").toLowerCase().trim();
            const yearVal = (item.Year || "").toString().trim();
            const yearClass = yearVal ? `year-${yearVal}` : '';
            const characterClasses = (item.Character || "").toLowerCase().split('-').map(c => c.trim()).join(' ');

            const wikiLink = (item.Wiki_Link || "").trim().replace(/['"]+$/g, '').replace(/^['"]+/g, '');
            const rawLinks = (item.Links || "").trim();
            const translationLinks = rawLinks.match(/https?:\/\/[^\s,"'>]+/g) || [];

            let linksHtml = "";
            
            if (wikiLink.toLowerCase().startsWith('http')) {
                linksHtml += `<a href="${wikiLink}" target="_blank" rel="noopener noreferrer" class="w-full border border-brand-primary text-brand-primary py-2 rounded-lg text-center text-[10px] font-bold hover:bg-brand-primary hover:text-white transition-all uppercase tracking-widest">Wiki Link</a>`;
            }

            if (translationLinks.length > 0) {
                translationLinks.forEach((link) => {
                    const cleanLink = link.replace(/['"]+$/g, '');
                    const label = getLinkTitle(cleanLink);
                    linksHtml += `<a href="${cleanLink}" target="_blank" rel="noopener noreferrer" class="w-full bg-brand-primary text-white py-2 rounded-lg text-center text-[10px] font-bold hover:bg-brand-dark transition-all uppercase tracking-widest">${label}</a>`;
                });
            }

            if (!linksHtml) {
                linksHtml = '<div class="w-full bg-slate-100 dark:bg-white/5 text-slate-400 py-2 rounded-lg text-center text-[10px] font-bold uppercase tracking-widest">No Links Available</div>';
            }

            return `
                <div class="item p-0 bg-white dark:bg-dark-card rounded-2xl overflow-hidden shadow-sm border border-rose-100 dark:border-brand-dark group transition-all duration-300 ${country} ${characterClasses} ${tlClass} ${yearClass}" data-id="${itemId}">
                    <div class="banner-container">
                        <img src="https://raw.githubusercontent.com/BerryJelena/MahoyakuMasterlist/main/root/assets/banner/${item.Image}" 
                             alt="${eventName} Banner" 
                             class="banner-img group-hover:scale-105"
                             onerror="this.onerror=null; this.src='https://placehold.co/400x150/9ca3af/ffffff?text=Image+Missing';">
                    </div>
                    <div class="content-text p-5">
                        <h2 class="text-xl font-black mb-1 break-words text-slate-900 dark:text-rose-50 group-hover:text-brand-primary transition-colors">${eventName}</h2>
                        <i class="text-sm text-slate-400 dark:text-brand-light/40 block mb-4 italic">Written by ${writer}</i>
                        <table class="table-auto text-[11px] mb-4 w-full">
                            <tr class="text-brand-primary/40 dark:text-white/20 font-black uppercase tracking-widest border-b border-rose-50 dark:border-white/5">
                                <td class="pb-1">Chapters</td>
                                <td class="text-right pb-1">Release</td>
                            </tr>
                            <tr class="text-slate-700 dark:text-rose-100/80 font-bold">
                                <td class="pt-1">${item.Chapters || '-'}</td>
                                <td class="text-right pt-1">${item.Release || '-'}</td>
                            </tr>
                        </table>
                        <div class="flex justify-between items-start pt-4 mt-2 border-t border-rose-50 dark:border-white/5">
                            <p class="text-[11px] text-slate-500 dark:text-rose-100/60 leading-relaxed pr-4 line-clamp-2">
                                <b class="font-bold uppercase tracking-tighter text-brand-primary/60 dark:text-brand-light/60">Cast:</b> ${charactersFormatted}
                            </p>
                            <div class="status-icon flex-shrink-0" title="${isTranslated ? 'Translated' : 'Pending Translation'}">
                                ${isTranslated ? CHECKMARK_SVG : BLANK_BOX_SVG}
                            </div>
                        </div>
                        <div class="flex flex-col gap-2 mt-5">
                            ${linksHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        async function fetchAndRender() {
            try {
                const response = await fetch(sheetURL);
                if (!response.ok) throw new Error("Could not load data from Google Sheets.");
                const csvText = await response.text();
                allItems = csvToObjects(csvText).filter(item => (item.Event_Name || item.Title));
                
                const yearsFound = [...new Set(allItems.map(i => i.Year).filter(y => y && String(y).trim() !== ""))];
                yearsFound.sort((a, b) => parseInt(a) - parseInt(b));
                
                const yearContainer = $('#year-filters');
                yearsFound.forEach(y => {
                    yearContainer.append(`
                        <button data-filter-value=".year-${y}" class="px-3 py-1 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-full">Year ${y}</button>
                    `);
                });

                const container = $('#grid');
                container.empty();
                allItems.forEach(item => {
                    container.append(createItemElement(item));
                });

                initializeIsotope();
                $('#loading').hide();
                $('#grid').removeClass('opacity-0');
            } catch (err) {
                $('#loading').html(`<p class="text-red-500 font-bold p-10 bg-white rounded-xl shadow">Error: ${err.message}</p>`);
            }
        }

        function initializeIsotope() {
            const rootFontSize = parseFloat(getComputedStyle(document.documentElement).fontSize);
            const gutterSize = 1.0 * rootFontSize;

            $grid = $('#grid').isotope({
                itemSelector: ".item", 
                percentPosition: true,
                layoutMode: 'masonry',
                masonry: {
                    columnWidth: '.item',
                    gutter: gutterSize
                },
                transitionDuration: '0.4s'
            });

            $grid.imagesLoaded().progress( function() {
                $grid.isotope('layout');
            });

            let qsRegex;
            $('#quicksearch').keyup(debounce(() => {
                qsRegex = new RegExp($('#quicksearch').val(), 'gi');
                updateFilter();
            }, 200));

            $('.filter-group').on('click', 'button', function() {
                const $this = $(this);
                const $group = $this.parents('.filter-group');
                const groupName = $group.attr('data-filter-group');
                if (groupName === 'character') {
                    $this.find('img').toggleClass('selected');
                } else {
                    $group.find('.active-filter').removeClass('active-filter');
                    $this.addClass('active-filter');
                }
                updateFilter();
            });

            function updateFilter() {
                filters = {};
                $('.filter-group').each(function() {
                    const group = $(this).attr('data-filter-group');
                    filters[group] = [];
                    if (group === 'character') {
                        $(this).find('.selected').parent().each(function() {
                            filters[group].push($(this).attr('data-filter-value'));
                        });
                    } else {
                        const val = $(this).find('.active-filter').attr('data-filter-value');
                        if (val) filters[group].push(val);
                    }
                });

                $grid.isotope({
                    filter: function() {
                        const $this = $(this);
                        const searchMatch = qsRegex ? $this.text().match(qsRegex) : true;
                        let groupMatch = true;
                        for (let g in filters) {
                            if (filters[g].length > 0) {
                                let localMatch = false;
                                for (let val of filters[g]) {
                                    if ($this.is(val)) { localMatch = true; break; }
                                }
                                if (!localMatch) { groupMatch = false; break; }
                            }
                        }
                        return searchMatch && groupMatch;
                    }
                });
            }

            $(window).resize(() => {
                const newGutter = 1.0 * parseFloat(getComputedStyle(document.documentElement).fontSize);
                $grid.isotope({ masonry: { gutter: newGutter } });
            });
        }

        function initUI() {
            const charContainer = $('#character-filters');
            characterData.forEach(c => {
                charContainer.append(`
                    <button data-filter-value=".${c.name}" class="flex justify-center" title="${c.name.toUpperCase()}">
                        <img src="https://raw.githubusercontent.com/mhyk-archive/mhyk-assets/main/chibi_heads/chara_${c.id}.png" class="chara-icon">
                    </button>
                `);
            });

            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            $('#dark-mode-toggle').click(() => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.theme = isDark ? 'dark' : 'light';
            });

            $('#mobile-menu-toggle').click(() => $('#sidebar').removeClass('-translate-x-full'));
            $('#close-sidebar').click(() => $('#sidebar').addClass('-translate-x-full'));
        }

        function debounce(fn, threshold) {
            let timeout;
            return function() {
                if (timeout) clearTimeout(timeout);
                timeout = setTimeout(() => { fn.apply(this); timeout = null; }, threshold || 100);
            }
        }

        window.onload = () => {
            initUI();
            fetchAndRender();
        };
    </script>
</body>
</html>
