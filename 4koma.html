<!DOCTYPE html>
<html lang="en">
<head>
    <title>4-Koma Translation Masterlist</title>
    <meta name="description" content="A fan-made Mahoyaku masterlist listing English translations of 4-Koma comics.">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/phosphor-icons"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        'brand-primary': '#9F2B68',
                        'brand-light':   '#c24e8a',
                        'brand-dark':    '#7a1f4f',
                        'dark-bg':       '#2d0a1d',
                        'dark-card':     '#3d1229',
                    }
                }
            }
        }
    </script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #9F2B68; border-radius: 10px; }
        .active-filter { background-color: #9F2B68 !important; color: white !important; }

        .chara-icon {
            width: 40px; height: 40px;
            transition: all 0.2s;
            border-radius: 8px;
            filter: grayscale(100%);
            opacity: 0.5;
            object-fit: cover;
            cursor: pointer;
        }
        .chara-icon.selected {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
            outline: 3px solid #9F2B68;
        }

        #grid { width: 100%; min-height: 400px; }
        .item { width: 100%; margin-bottom: 1.5rem; }
        @media (min-width: 640px) { .item { width: calc(50% - 0.75rem); } }
        @media (min-width: 1024px) { .item { width: calc(33.333% - 1rem); } }
        @media (min-width: 1536px) { .item { width: calc(25% - 1.125rem); } }

        .koma-card {
            display: flex; flex-direction: column; background: #fff; border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(159,43,104,0.12); box-shadow: 0 2px 8px -2px rgba(159,43,104,0.08);
            transition: transform 0.25s ease; height: 100%;
        }
        .dark .koma-card { background: #3d1229; border-color: rgba(159,43,104,0.3); }
        .item:hover .koma-card { transform: translateY(-3px); box-shadow: 0 8px 20px -4px rgba(159,43,104,0.18); }

        .koma-top { display: flex; flex-direction: row; flex: 1; }
        .koma-img-wrap { width: 110px; flex-shrink: 0; background: #fce7f3; overflow: hidden; }
        .dark .koma-img-wrap { background: #2d0a1d; }
        .koma-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .koma-info { flex: 1; padding: 0.75rem 0.85rem; display: flex; flex-direction: column; gap: 0.35rem; min-width: 0; }
        .koma-title { font-size: 0.85rem; font-weight: 800; line-height: 1.25; color: #1e293b; }
        .dark .koma-title { color: #fce7f3; }
        .koma-num { font-size: 0.65rem; font-weight: 700; color: #9F2B68; background: #fce7f3; border-radius: 999px; padding: 0.1rem 0.45rem; }

        .koma-meta-label { font-weight: 700; color: #9F2B68; font-size: 0.68rem; }
        .koma-chars { padding: 0.45rem 0.85rem; border-top: 1px solid rgba(159,43,104,0.1); font-size: 0.68rem; color: #475569; }
        .dark .koma-chars { color: #cbd5e1; border-color: rgba(159,43,104,0.3); }

        .koma-links { padding: 0.5rem 0.7rem; background: rgba(252,231,243,0.45); border-top: 1px solid rgba(159,43,104,0.1); display: flex; flex-direction: column; gap: 0.35rem; }
        .dark .koma-links { background: rgba(45,10,29,0.5); border-color: rgba(159,43,104,0.3); }

        .link-btn { display: flex; align-items: center; justify-content: center; gap: 0.35rem; width: 100%; padding: 0.4rem; border-radius: 8px; font-size: 0.69rem; font-weight: 700; text-decoration: none; text-align: center; }
        .link-btn-tl { background: #9F2B68; color: #fff; }
        .link-btn-wiki { background: #fce7f3; color: #9F2B68; }
        .dark .link-btn-wiki { background: #7a1f4f; color: #fce7f3; }

        #empty-state { display: none; }
    </style>
</head>
<body class="bg-rose-50/30 text-slate-900 dark:bg-dark-bg dark:text-rose-50 min-h-screen">

    <div class="lg:hidden sticky top-0 z-50 bg-white/90 dark:bg-dark-bg/90 p-4 flex justify-between items-center border-b border-rose-100 dark:border-brand-dark">
        <h1 class="font-black text-brand-primary uppercase italic leading-none">4-Koma</h1>
        <button id="mobile-menu-toggle" class="p-2 bg-rose-100 dark:bg-brand-dark rounded-lg"><i class="ph-funnel-bold text-2xl"></i></button>
    </div>

    <div class="flex flex-col lg:flex-row">
        <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-dark-card border-r border-rose-100 dark:border-brand-dark transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto p-6">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-xl font-black text-brand-primary uppercase italic">4-Koma</h2>
                <button id="close-sidebar" class="lg:hidden text-2xl"><i class="ph-x-bold"></i></button>
            </div>

            <!-- Search -->
            <div class="mb-6">
                <input type="text" id="quicksearch" placeholder="Search title..." class="w-full px-4 py-2 bg-rose-50 dark:bg-brand-dark/50 rounded-xl outline-none text-sm dark:text-white">
            </div>

            <!-- TL Status -->
            <div class="mb-6">
                <h3 class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-3">Translation Status</h3>
                <div class="flex flex-col gap-2 filter-group" data-filter-group="tlStatus">
                    <button data-filter-value="*" class="active-filter text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl">All</button>
                    <button data-filter-value=".tl" class="text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl">Translated</button>
                    <button data-filter-value=".notl" class="text-left px-4 py-2 text-xs font-bold bg-rose-50 dark:bg-brand-dark/30 rounded-xl">Untranslated</button>
                </div>
            </div>

            <!-- Characters -->
            <div class="mb-6 pb-5 border-b border-rose-100 dark:border-brand-dark">
                <h3 class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-3">Owner Wizard</h3>
                <div id="character-filters" class="grid grid-cols-4 gap-3 filter-group" data-filter-group="wizard">
                    <!-- JS populated -->
                </div>
            </div>

            <div class="mt-auto">
                <p class="text-[10px] font-bold opacity-50 mb-4 text-slate-500 dark:text-rose-200">Showing <span id="result-count">0</span> entries</p>
                <button id="dark-mode-toggle" class="w-full p-3 rounded-xl bg-brand-primary text-white font-bold text-xs hover:bg-brand-dark transition-colors">Toggle Night Mode</button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-4 lg:p-10">
            <header class="mb-8">
                <h1 class="text-3xl lg:text-4xl font-black text-brand-primary uppercase italic">4-Koma Masterlist</h1>
                <p class="text-sm text-slate-500 dark:text-rose-200 mt-1">
                    Fan-made comic translation archive — thanks to 
                    <span class="font-semibold text-brand-primary dark:text-brand-light">@sellei</span> for the help!
                </p>
            </header>

            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-brand-primary border-t-transparent rounded-full animate-spin"></div>
            </div>

            <div id="empty-state" class="text-center py-20">
                <p class="font-bold opacity-50">No entries match your filters</p>
                <button id="clear-filters-btn" class="mt-4 px-4 py-2 bg-brand-primary text-white rounded-xl text-xs">Clear Filters</button>
            </div>

            <div id="grid" class="opacity-0 transition-opacity duration-500"></div>
        </main>
    </div>

    <script>
        const characterData = [
            { name: "oz", id: 1 }, { name: "arthur", id: 2 }, { name: "cain", id: 3 }, { name: "riquet", id: 4 },
            { name: "snow", id: 5 }, { name: "white", id: 6 }, { name: "mithra", id: 7 }, { name: "owen", id: 8 },
            { name: "bradley", id: 9 }, { name: "faust", id: 10 }, { name: "shino", id: 11 }, { name: "heathcliff", id: 12 },
            { name: "nero", id: 13 }, { name: "shylock", id: 14 }, { name: "murr", id: 15 }, { name: "chloe", id: 16 },
            { name: "rustica", id: 17 }, { name: "figaro", id: 18 }, { name: "rutile", id: 19 }, { name: "lennox", id: 20 },
            { name: "mitile", id: 21 }, { name: "akira", id: 22 }, { name: "cockrobin", id: 23 }
        ];

        const sheetId = "1SHxrt80OQj4RfjnhmkFiGI_pLr03F-f6DUlBoOlsONU";
        const sheetURL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Output_(4Koma)`;
        const GITHUB_CHIBI_BASE = "https://raw.githubusercontent.com/BerryJelena/MahoyakuMasterlist/main/root/assets/Chibis/";
        const CHIBI_HEADS_BASE = "https://raw.githubusercontent.com/mhyk-archive/mhyk-assets/main/chibi_heads/";

        let $isoGrid = null;
        let activeFilters = { tlStatus: ['*'], wizard: [] };

        const sanitize = (str) => (str || '').toString().toLowerCase().trim().replace(/[^a-z0-9]/g, '');
        const clean = (val) => (val || '').replaceAll('_', ' ').replaceAll('$', ',').trim();

        /**
         * Parses a URL to return a user-friendly label (e.g., Twitter: @user)
         */
        function getLinkLabel(url) {
            if (!url) return "Translation";
            try {
                const uri = new URL(url);
                const path = uri.pathname.split('/').filter(p => p);
                
                if (uri.hostname.includes('twitter.com') || uri.hostname.includes('x.com')) {
                    return path[0] ? `Twitter: @${path[0]}` : "Twitter";
                }
                if (uri.hostname.includes('bsky.app')) {
                    return path[1] ? `BlueSky: @${path[1]}` : "BlueSky";
                }
                if (uri.hostname.includes('drive.google.com')) return "Google Drive";
                if (uri.hostname.includes('imgur.com')) return "Imgur";
                if (uri.hostname.includes('tumblr.com')) {
                    const sub = uri.hostname.split('.')[0];
                    return `Tumblr: ${sub}`;
                }
                return uri.hostname.replace('www.', '').split('.')[0];
            } catch (e) {
                return "Link";
            }
        }

        function buildCard(obj, i) {
            const wizardOwner = sanitize(obj.Wizard || obj.Country);
            const country = sanitize(obj.Country);
            
            const rawWiki = clean(obj.Wiki_Link);
            const rawLinks = (obj.Links || '').split(/\s+/).filter(l => l && l.length > 5);
            const hasLinks = rawWiki.length > 0 || rawLinks.length > 0;
            const statusClass = hasLinks ? 'tl' : 'notl';

            const imageUrl = GITHUB_CHIBI_BASE + (obj.Image || obj.Chibi);

            let linksHtml = '';
            if (rawWiki) linksHtml += `<a class="link-btn link-btn-wiki" href="${rawWiki}" target="_blank">Wiki</a>`;
            rawLinks.forEach(l => {
                const link = l.replace(/^['"]+|['"]+$/g, '').replaceAll('$', ',');
                linksHtml += `<a class="link-btn link-btn-tl" href="${link}" target="_blank">${getLinkLabel(link)}</a>`;
            });

            return `
                <div class="item ${country} ${statusClass} owner-${wizardOwner}">
                    <div class="koma-card">
                        <div class="koma-top">
                            <div class="koma-img-wrap"><img src="${imageUrl}" onerror="this.src='https://placehold.co/110x150?text=?'"></div>
                            <div class="koma-info">
                                <div class="flex justify-between"><h2 class="koma-title">${clean(obj.Title || obj.Chibi)}</h2><span class="koma-num">#${obj.Number || i+1}</span></div>
                                <p class="text-[10px] italic opacity-50">${clean(obj.JP_Title)}</p>
                                <div class="mt-2"><span class="koma-meta-label">Wizard:</span> <span class="text-xs capitalize">${clean(obj.Wizard || obj.Country)}</span></div>
                            </div>
                        </div>
                        <div class="koma-chars"><span class="font-bold text-brand-primary">Characters:</span> ${clean(obj.Character).replaceAll('-', ', ')}</div>
                        <div class="koma-links">${linksHtml || '<div class="h-2"></div>'}</div>
                    </div>
                </div>`;
        }

        function applyFilters() {
            if (!$isoGrid) return;
            $isoGrid.isotope({
                filter: function() {
                    const $el = $(this);
                    const search = $('#quicksearch').val().toLowerCase();
                    const matchSearch = search ? $el.text().toLowerCase().includes(search) : true;

                    const sFilter = activeFilters.tlStatus[0];
                    const matchStatus = sFilter === '*' ? true : $el.hasClass(sFilter.replace('.', ''));

                    let matchWizard = true;
                    if (activeFilters.wizard.length > 0) {
                        matchWizard = activeFilters.wizard.some(w => $el.hasClass('owner-' + w.replace('.', '')));
                    }

                    return matchSearch && matchStatus && matchWizard;
                }
            });
            setTimeout(() => { 
                const count = $isoGrid.isotope('getFilteredItemElements').length;
                $('#result-count').text(count); 
                $('#empty-state').toggle(count === 0);
            }, 200);
        }

        async function init() {
            try {
                const res = await fetch(sheetURL);
                const csv = await res.text();
                const rows = csv.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                const data = rows.slice(1).map(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                    const obj = {};
                    headers.forEach((h, j) => { obj[h] = (cols[j] || '').trim().replace(/^"|"$/g, ''); });
                    return obj;
                }).filter(o => o.Image || o.Chibi);

                $('#grid').html(data.map((d, i) => buildCard(d, i)).join(''));
                
                $isoGrid = $('#grid').imagesLoaded(() => {
                    $('#loading').hide();
                    $('#grid').removeClass('opacity-0').isotope({ 
                        itemSelector: '.item', 
                        layoutMode: 'masonry',
                        masonry: { gutter: 16 } 
                    });
                    applyFilters();
                });
            } catch (e) { console.error(e); }
        }

        $(document).ready(() => {
            characterData.forEach(c => {
                $('#character-filters').append(`<button data-filter-value=".${c.name}" class="flex justify-center"><img src="${CHIBI_HEADS_BASE}chara_${c.id}.png" class="chara-icon" title="${c.name}"></button>`);
            });

            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                $('html').addClass('dark');
            }
            $('#dark-mode-toggle').on('click', function() {
                $('html').toggleClass('dark');
                localStorage.theme = $('html').hasClass('dark') ? 'dark' : 'light';
            });

            $('.filter-group').on('click', 'button', function() {
                const $btn = $(this);
                const group = $btn.closest('.filter-group').data('filter-group');
                const val = $btn.data('filter-value');

                if (group === 'wizard') {
                    $btn.find('img').toggleClass('selected');
                    activeFilters.wizard = $btn.closest('.filter-group').find('img.selected').map(function() { 
                        return $(this).parent().data('filter-value'); 
                    }).get();
                } else {
                    $btn.siblings().removeClass('active-filter');
                    $btn.addClass('active-filter');
                    activeFilters[group] = [val];
                }
                applyFilters();
            });

            $('#quicksearch').on('keyup', applyFilters);
            $('#clear-filters-btn').on('click', () => { location.reload(); });
            $('#mobile-menu-toggle, #close-sidebar').on('click', () => { $('#sidebar').toggleClass('-translate-x-full'); });
            
            init();
        });
    </script>
</body>
</html>
